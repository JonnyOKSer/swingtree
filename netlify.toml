[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  targetPort = 5173
  autoLaunch = false

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Scheduled function: Auto-reconcile every 10 minutes (ESPN-based)
[functions."auto-reconcile"]
  schedule = "*/10 * * * *"

# Scheduled function: Sync draw data from api-tennis.com every 15 minutes
[functions."sync-draw"]
  schedule = "*/15 * * * *"

# Scheduled function: Reconcile orphaned predictions every 15 minutes
[functions."reconcile-predictions"]
  schedule = "*/15 * * * *"

# Scheduled function: Update live matches status every 5 minutes
# This is a lightweight check that only queries matches currently marked as "live"
[functions."update-live-matches"]
  schedule = "*/5 * * * *"

# API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
