<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Acacia tree silhouette in Serengeti gold on transparent background -->
  <g fill="#c4973b">
    <!-- Trunk - enlarged -->
    <rect x="14" y="22" width="4" height="10"/>

    <!-- Main umbrella canopy - fills the space -->
    <ellipse cx="16" cy="16" rx="15" ry="6"/>
    <ellipse cx="16" cy="17" rx="14" ry="5"/>

    <!-- Canopy top layers -->
    <path d="M1 16 Q5 9 16 8 Q27 9 31 16 Q27 14 16 13 Q5 14 1 16"/>

    <!-- Top dome - pronounced -->
    <ellipse cx="16" cy="11" rx="11" ry="5"/>
    <ellipse cx="16" cy="9" rx="8" ry="4"/>
  </g>
</svg>
